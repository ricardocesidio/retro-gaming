<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | My Retro Room</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../style/style.css">
    
    <style>
        .back-home {
            position: absolute;
            top: 20px;
            left: 20px;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.3s;
            z-index: 100;
        }
        .back-home:hover { color: var(--accent-purple); transform: translateX(-5px); }

        #loginError {
            color: #ff4444;
            background: rgba(255, 68, 68, 0.1);
            border: 1px solid #ff4444;
            padding: 10px;
            border-radius: 6px;
            font-size: 0.85rem;
            margin-bottom: 15px;
            display: none;
            text-align: center;
        }

        .input-error {
            border-color: #ff4444 !important;
            box-shadow: 0 0 8px rgba(255, 68, 68, 0.2) !important;
        }

        .password-container { position: relative; width: 100%; }
        .password-container input { padding-right: 45px; }
        .toggle-password {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: var(--text-muted);
            transition: 0.3s;
        }
        .toggle-password:hover { color: var(--accent-purple); }

        .login-card { max-width: 420px; margin: 40px auto; }
    </style>
</head>
<body>

    <a href="index.html" class="back-home">
        <i class="fa-solid fa-arrow-left"></i> Back to Home
    </a>

    <div class="login-wrapper">
        <div class="login-card">
            <h2>WELCOME BACK</h2>
            <p>Enter your credentials to access your room</p>

            <div id="loginError">Invalid email or password.</div>

            <form class="login-form" id="loginForm" novalidate>
                <div class="form-group">
                    <label><i class="fa-solid fa-envelope"></i> Email Address</label>
                    <input type="email" id="loginEmail" placeholder="name@example.com" required>
                </div>
                
                <div class="form-group">
                    <label><i class="fa-solid fa-lock"></i> Password</label>
                    <div class="password-container">
                        <input type="password" id="loginPass" placeholder="••••••••" required>
                        <i class="fa-solid fa-eye toggle-password" id="toggleLoginPass"></i>
                    </div>
                </div>
                
                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox"> Remember me
                    </label>
                    <a href="#" class="forgot-pass" style="color: var(--accent-purple);">Forgot Password?</a>
                </div>

                <button type="submit" class="btn-login-submit">LOGIN TO ACCOUNT</button>
            </form>

            <div class="login-footer-links">
                New to the room? <a href="register.html">Register yourself</a>
            </div>
        </div>
    </div>

    <script>
        const loginForm = document.getElementById('loginForm');
        const loginEmail = document.getElementById('loginEmail');
        const loginPass = document.getElementById('loginPass');
        const loginError = document.getElementById('loginError');
        const toggleBtn = document.getElementById('toggleLoginPass');

        toggleBtn.addEventListener('click', () => {
            const type = loginPass.getAttribute('type') === 'password' ? 'text' : 'password';
            loginPass.setAttribute('type', type);
            toggleBtn.classList.toggle('fa-eye');
            toggleBtn.classList.toggle('fa-eye-slash');
        });

        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();

            loginError.style.display = 'none';
            loginEmail.classList.remove('input-error');
            loginPass.classList.remove('input-error');

            // Puxa o usuário registrado no LocalStorage
            const storedUser = JSON.parse(localStorage.getItem('registeredUser'));
            
            const emailInput = loginEmail.value;
            const passInput = loginPass.value;

            // Validação
            if (storedUser && emailInput === storedUser.email && passInput === storedUser.password) {
                // SUCESSO: Salva a sessão e redireciona imediatamente
                sessionStorage.setItem('isLoggedIn', 'true');
                sessionStorage.setItem('currentUser', storedUser.username);
                
                window.location.href = "index.html"; // Redirecionamento direto
            } else {
                // ERRO: Mostra feedbacks visuais
                loginError.style.display = 'block';
                loginError.innerText = "Invalid credentials or account does not exist.";
                loginEmail.classList.add('input-error');
                loginPass.classList.add('input-error');
            }
        });
    </script>
</body>
</html>
